version: '3.9'

services:
  api:
    build: .
    ports:
      - "7860:7860"
    env_file:
      - .env
    environment:
      - STORAGE_BACKEND=gcs
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcp-sa-key.json
      - DATA_DIR=/tmp/rfp-cache
    volumes:
      - ./secrets:/secrets:ro
    restart: unless-stopped

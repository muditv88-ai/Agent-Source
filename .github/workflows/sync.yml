name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push subfolder to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Copy only the app subfolder to a temp dir
          cp -r rfp-intelligence-copilot /tmp/hf-space
          cd /tmp/hf-space

          # Init a fresh git repo and point it at the HF Space
          git init
          git config user.email "action@github.com"
          git config user.name "GitHub Action"

          # Add HF remote
          git remote add space https://muditv88-ai:$HF_TOKEN@huggingface.co/spaces/muditv88-ai/sourceiq-backend

          # Commit everything
          git add -A
          git commit -m "Sync from GitHub $GITHUB_SHA"

          # Force push to main branch on HF Space
          git push --force space HEAD:main

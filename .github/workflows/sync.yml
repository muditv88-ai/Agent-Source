name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push subfolder to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Split out only the rfp-intelligence-copilot/ subfolder
          # so the Dockerfile lands at the root of the HF Space
          git config user.email "action@github.com"
          git config user.name "GitHub Action"

          SPLIT_SHA=$(git subtree split --prefix=rfp-intelligence-copilot HEAD)

          git push --force \
            https://muditv88-ai:$HF_TOKEN@huggingface.co/spaces/muditv88-ai/sourceiq-backend \
            $SPLIT_SHA:main
